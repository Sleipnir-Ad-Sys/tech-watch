# ============================================================
# tech-watch — Configuration principale
# ============================================================

app:
  name: "Tech Watch"
  version: "0.1.0"
  description: "Plateforme de veille technologique automatisée"
  timezone: "Europe/Paris"

# ---- Chemins -----------------------------------------------
paths:
  data_dir: "data"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  warehouse: "data/warehouse.duckdb"
  web_data: "web/data.json"

# ---- Sources GitHub ----------------------------------------
github:
  base_url: "https://api.github.com"
  # Définir GITHUB_TOKEN en variable d'environnement pour éviter le rate-limit
  # token: "${GITHUB_TOKEN}"
  per_page: 30
  repos:
    - owner: "pola-rs"
      repo: "polars"
      category: "data-engineering"
      weight: 1.5
    - owner: "duckdb"
      repo: "duckdb"
      category: "data-engineering"
      weight: 1.5
    - owner: "apache"
      repo: "arrow"
      category: "data-engineering"
      weight: 1.2
    - owner: "tiangolo"
      repo: "fastapi"
      category: "backend"
      weight: 1.2
    - owner: "tokio-rs"
      repo: "axum"
      category: "backend-rust"
      weight: 1.0
    - owner: "tokio-rs"
      repo: "tokio"
      category: "backend-rust"
      weight: 1.0
    - owner: "huggingface"
      repo: "transformers"
      category: "ai"
      weight: 1.3
    - owner: "astral-sh"
      repo: "uv"
      category: "tooling"
      weight: 1.1
    - owner: "apache"
      repo: "iceberg"
      category: "lakehouse"
      weight: 1.2
    - owner: "delta-io"
      repo: "delta-rs"
      category: "lakehouse"
      weight: 1.2

