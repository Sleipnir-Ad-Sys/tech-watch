# ============================================================
# tech-watch — Configuration principale
# ============================================================

app:
  name: "Tech Watch"
  version: "0.1.0"
  description: "Plateforme de veille technologique automatisée"
  timezone: "Europe/Paris"

# ---- Chemins -----------------------------------------------
paths:
  data_dir: "data"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  warehouse: "data/warehouse.duckdb"
  web_data: "web/data.json"

# ---- Sources GitHub ----------------------------------------
github:
  base_url: "https://api.github.com"
  # Définir GITHUB_TOKEN en variable d'environnement pour éviter le rate-limit
  # token: "${GITHUB_TOKEN}"
  per_page: 30
  repos:
    - owner: "pola-rs"
      repo: "polars"
      category: "data-engineering"
      weight: 1.5
    - owner: "duckdb"
      repo: "duckdb"
      category: "data-engineering"
      weight: 1.5
    - owner: "apache"
      repo: "arrow"
      category: "data-engineering"
      weight: 1.2
    - owner: "tiangolo"
      repo: "fastapi"
      category: "backend"
      weight: 1.2
    - owner: "tokio-rs"
      repo: "axum"
      category: "backend-rust"
      weight: 1.0
    - owner: "tokio-rs"
      repo: "tokio"
      category: "backend-rust"
      weight: 1.0
    - owner: "huggingface"
      repo: "transformers"
      category: "ai"
      weight: 1.3
    - owner: "astral-sh"
      repo: "uv"
      category: "tooling"
      weight: 1.1
    - owner: "apache"
      repo: "iceberg"
      category: "lakehouse"
      weight: 1.2
    - owner: "delta-io"
      repo: "delta-rs"
      category: "lakehouse"
      weight: 1.2

# ---- Feeds RSS ---------------------------------------------
rss:
  feeds:
    - name: "DuckDB Blog"
      url: "https://duckdb.org/feed.xml"
      category: "data-engineering"
    - name: "Polars Blog"
      url: "https://pola.rs/posts/index.xml"
      category: "data-engineering"
    - name: "Towards Data Science"
      url: "https://towardsdatascience.com/feed"
      category: "data-science"
    - name: "The Pragmatic Engineer"
      url: "https://newsletter.pragmaticengineer.com/feed"
      category: "engineering"
    - name: "Databricks Blog"
      url: "https://www.databricks.com/feed"
      category: "lakehouse"
    - name: "Martin Fowler Blog"
      url: "https://martinfowler.com/feed.atom"
      category: "architecture"
    - name: "Hugging Face Blog"
      url: "https://huggingface.co/blog/feed.xml"
      category: "ai"
    - name: "This Week in Rust"
      url: "https://this-week-in-rust.org/rss.xml"
      category: "backend-rust"
    - name: "The Batch (DeepLearning.AI)"
      url: "https://www.deeplearning.ai/the-batch/feed/"
      category: "ai"

# ---- PyPI --------------------------------------------------
pypi:
  base_url: "https://pypi.org/pypi"
  packages:
    - name: "polars"
      category: "data-engineering"
      weight: 1.5
    - name: "duckdb"
      category: "data-engineering"
      weight: 1.5
    - name: "fastapi"
      category: "backend"
      weight: 1.2
    - name: "pydantic"
      category: "tooling"
      weight: 1.1
    - name: "pyarrow"
      category: "data-engineering"
      weight: 1.1
    - name: "delta-spark"
      category: "lakehouse"
      weight: 1.0
    - name: "deltalake"
      category: "lakehouse"
      weight: 1.0
    - name: "ibis-framework"
      category: "data-engineering"
      weight: 1.1
    # IA / ML
    - name: "transformers"
      category: "ai"
      weight: 1.4
    - name: "scikit-learn"
      category: "ai"
      weight: 1.2
    - name: "langchain-core"
      category: "ai"
      weight: 1.3
    - name: "openai"
      category: "ai"
      weight: 1.2
    - name: "sentence-transformers"
      category: "ai"
      weight: 1.1
    # Rust / Tooling Rust
    - name: "ruff"
      category: "backend-rust"
      weight: 1.2
    - name: "maturin"
      category: "backend-rust"
      weight: 1.0
    - name: "uv"
      category: "backend-rust"
      weight: 1.1

# ---- Scoring -----------------------------------------------
scoring:
  weights:
    major_version: 10.0      # bump version majeure
    minor_version: 3.0       # bump version mineure
    patch_version: 0.5       # bump patch
    breaking_change: 8.0     # détection BREAKING CHANGE
    high_frequency: 2.0      # releases fréquentes
    repo_weight: 1.0         # multiplicateur importance repo
  breaking_keywords:
    - "BREAKING CHANGE"
    - "BREAKING:"
    - "breaking change"
    - "incompatible"
    - "removed"
    - "deprecated"
    - "migration required"
  trend_window_days: 30      # fenêtre glissante tendances

# ---- API ---------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "https://*.github.io"
  max_results: 100

# ---- Scheduler ---------------------------------------------
scheduler:
  enabled: true
  cron: "0 7 * * *"         # tous les jours à 7h00
  timezone: "Europe/Paris"

# ---- Découverte automatique --------------------------------
discovery:
  enabled: true
  per_topic: 8          # résultats max par topic
  min_stars: 500        # étoiles minimum pour figurer dans les découvertes
  topics:
    - name: "data-engineering"
      category: "data-engineering"
    - name: "dataframe"
      category: "data-engineering"
    - name: "query-engine"
      category: "data-engineering"
    - name: "stream-processing"
      category: "data-engineering"
    - name: "llm"
      category: "ai"
    - name: "rag"
      category: "ai"
    - name: "mlops"
      category: "ai"
    - name: "lakehouse"
      category: "lakehouse"
    - name: "databricks"
      category: "lakehouse"
    - name: "azure-databricks"
      category: "lakehouse"
