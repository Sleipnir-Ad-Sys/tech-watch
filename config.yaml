# ---- Analyse d'impact changelog ----------------------------
impact_analysis:

  # Pondérations par catégorie — modifier ici sans toucher au code
  changelog_weights:
    security:       100.0   # CVE, vulnérabilité, faille
    breaking_change: 50.0   # BREAKING CHANGE, incompatible
    deprecated:      30.0   # dépréciation d'API
    removed:         30.0   # suppression de fonctionnalité
    migration:       25.0   # guide de migration requis
    performance:      8.0   # optimisations, speedup, mémoire (jamais CRITICAL seul)
    enhancement:      6.0   # nouvelles fonctionnalités
    bug_fix:          3.0   # corrections de bugs
    documentation:    1.0   # mise à jour docs uniquement

  # Classification du score technique
  # 0–20  → LOW | 21–50 → MODERATE | 51–100 → HIGH | >100 → CRITICAL

  # Profils utilisateur par défaut (actifs si non spécifié dans la requête)
  default_profiles:
    - data_engineering

  # Profils disponibles — score de pertinence par technologie (0-10)
  profiles:
    data_engineering:
      label: "Data Engineering"
      technologies:
        polars:              10
        duckdb:              10
        arrow:                9
        pyarrow:              9
        iceberg:              8
        delta_rs:             8
        delta:                8
        spark:                7
        pandas:               6
        ibis:                 7
        ibis_framework:       7
        dbt:                  8
        great_expectations:   6
        datafusion:           8
        substrait:            7

    analytics_engineering:
      label: "Analytics Engineering"
      technologies:
        dbt:         10
        duckdb:       9
        polars:       8
        metabase:     7
        looker:       7
        lightdash:    7
        superset:     6
        evidence:     8
        rill:         7

    python:
      label: "Python"
      technologies:
        fastapi:     9
        pydantic:    8
        ruff:        8
        uv:          8
        pyarrow:     7
        httpx:       7
        starlette:   8
        uvicorn:     7
        pytest:      7
        mypy:        7
        black:       6
        typer:       7
        rich:        6
        structlog:   6

    rust:
